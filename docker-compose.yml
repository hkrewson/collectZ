# Generated by scripts/generate-public-compose.js. Do not edit by hand.
# Public homelab deployment compose for prebuilt collectZ images.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collectz}
      POSTGRES_USER: ${DB_USER:-collectz}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-collectz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-hkrewson}/collectz-backend:${IMAGE_TAG:-3.8.6}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DEBUG: ${DEBUG:-0}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      PORT: 3001
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_URL: postgresql://${DB_USER:-collectz}:${DB_PASSWORD}@db:5432/${POSTGRES_DB:-collectz}
      AUDIT_LOG_MODE: ${AUDIT_LOG_MODE:-failures}
      LOG_EXPORT_BACKEND: ${LOG_EXPORT_BACKEND:-off}
      LOG_EXPORT_HOST: ${LOG_EXPORT_HOST:-127.0.0.1}
      LOG_EXPORT_PORT: ${LOG_EXPORT_PORT:-12201}
      LOG_EXPORT_SETTINGS_READ_ONLY: ${LOG_EXPORT_SETTINGS_READ_ONLY:-false}
      LOG_EXPORT_HOST_LABEL: ${LOG_EXPORT_HOST_LABEL:-collectz-backend}
      LOG_EXPORT_SERVICE: ${LOG_EXPORT_SERVICE:-backend}
      LOG_EXPORT_DEBUG: ${LOG_EXPORT_DEBUG:-false}
      LOG_EXPORT_MAX_DETAIL_BYTES: ${LOG_EXPORT_MAX_DETAIL_BYTES:-16384}
      GIT_SHA: ${GIT_SHA:-}
      APP_VERSION: ${APP_VERSION:-3.8.6}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-session_token}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-csrf_token}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-}
      METRICS_SCRAPE_TOKEN: ${METRICS_SCRAPE_TOKEN:-}
      TMDB_PRESET: ${TMDB_PRESET:-tmdb}
      TMDB_PROVIDER: ${TMDB_PROVIDER:-tmdb}
      TMDB_API_URL: ${TMDB_API_URL:-https://api.themoviedb.org/3/search/movie}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_API_KEY_HEADER: ${TMDB_API_KEY_HEADER:-}
      TMDB_API_KEY_QUERY_PARAM: ${TMDB_API_KEY_QUERY_PARAM:-api_key}
      BARCODE_PRESET: ${BARCODE_PRESET:-upcitemdb}
      BARCODE_PROVIDER: ${BARCODE_PROVIDER:-upcitemdb}
      BARCODE_API_URL: ${BARCODE_API_URL:-https://api.upcitemdb.com/prod/trial/lookup}
      BARCODE_API_KEY: ${BARCODE_API_KEY:-}
      BARCODE_API_KEY_HEADER: ${BARCODE_API_KEY_HEADER:-x-api-key}
      BARCODE_QUERY_PARAM: ${BARCODE_QUERY_PARAM:-upc}
      VISION_PRESET: ${VISION_PRESET:-ocrspace}
      VISION_PROVIDER: ${VISION_PROVIDER:-ocrspace}
      VISION_API_URL: ${VISION_API_URL:-https://api.ocr.space/parse/image}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_API_KEY_HEADER: ${VISION_API_KEY_HEADER:-apikey}
      PLEX_PRESET: ${PLEX_PRESET:-plex}
      PLEX_PROVIDER: ${PLEX_PROVIDER:-plex}
      PLEX_API_URL: ${PLEX_API_URL:-}
      PLEX_SERVER_NAME: ${PLEX_SERVER_NAME:-}
      PLEX_API_KEY: ${PLEX_API_KEY:-}
      PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_ENABLED: ${PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_ENABLED:-true}
      PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_INTERVAL_SECONDS: ${PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_INTERVAL_SECONDS:-15}
      PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_BATCH_SIZE: ${PLEX_WEBHOOK_IMPORT_AUTO_PROCESSOR_BATCH_SIZE:-3}
      PLEX_RECONCILIATION_SYNC_ENABLED: ${PLEX_RECONCILIATION_SYNC_ENABLED:-false}
      PLEX_RECONCILIATION_SYNC_INTERVAL_MINUTES: ${PLEX_RECONCILIATION_SYNC_INTERVAL_MINUTES:-360}
      PLEX_RECONCILIATION_SYNC_LIMIT: ${PLEX_RECONCILIATION_SYNC_LIMIT:-}
      PLEX_WATCH_STATE_REFRESH_ENABLED: ${PLEX_WATCH_STATE_REFRESH_ENABLED:-false}
      PLEX_WATCH_STATE_REFRESH_INTERVAL_MINUTES: ${PLEX_WATCH_STATE_REFRESH_INTERVAL_MINUTES:-60}
      PLEX_WATCH_STATE_REFRESH_MAX_ITEMS: ${PLEX_WATCH_STATE_REFRESH_MAX_ITEMS:-100}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PLAYWRIGHT_E2E_BYPASS_TOKEN: ${PLAYWRIGHT_E2E_BYPASS_TOKEN:-}
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-hkrewson}/collectz-frontend:${IMAGE_TAG:-3.8.6}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  media_uploads:

networks:
  internal:
    driver: bridge
