# Generated by scripts/generate-public-compose.js. Do not edit by hand.
# Public homelab deployment compose for prebuilt collectZ images.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collectz}
      POSTGRES_USER: ${DB_USER:-collectz}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-collectz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/hkrewson/collectz-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      PORT: 3001
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_URL: postgresql://${DB_USER:-collectz}:${DB_PASSWORD}@db:5432/${POSTGRES_DB:-collectz}
      SESSION_SECRET: ${SESSION_SECRET}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/hkrewson/collectz-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  media_uploads:

networks:
  internal:
    driver: bridge
