name: "collectZ CodeQL maintained source baseline"

query-filters:
  - exclude:
      id: js/http-to-file-access
  - exclude:
      id: js/request-forgery

paths-ignore:
  - "artifacts/**"
  - "backend/artifacts/**"
  - "frontend/artifacts/**"
  - "playwright-report/**"
  - "**/playwright-report/**"
  - "test-results/**"
  - "**/test-results/**"
  - "coverage/**"
  - "backend/coverage/**"
  - "frontend/coverage/**"
  - "**/coverage/**"
  - ".nyc_output/**"
  - "**/.nyc_output/**"
  - "dist/**"
  - "backend/dist/**"
  - "frontend/dist/**"
  - "**/dist/**"
  - "build/**"
  - "backend/build/**"
  - "frontend/build/**"
  - "**/build/**"
  - "node_modules/**"
  - "backend/node_modules/**"
  - "frontend/node_modules/**"
  - "**/node_modules/**"
  - "**/*.sarif"
  - "**/*.sarif.json"
