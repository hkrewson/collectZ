    "/api/wishlist/apple-itunes/search": {
      "get": {
        "tags": ["Wishlist"],
        "summary": "Search Apple/iTunes Store candidates for wishlist intake",
        "description": "Authenticated backend-owned Apple Search API proxy for Wishlist search and save. The endpoint can return multiple candidates and annotates scoped candidates that are already saved.",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "parameters": [
          { "name": "term", "in": "query", "required": true, "schema": { "type": "string" } },
          {
            "name": "media",
            "in": "query",
            "required": false,
            "description": "One Apple media value or a comma-separated list. Defaults to movie.",
            "schema": { "type": "string", "default": "movie", "enum": ["movie", "tvShow", "music", "musicVideo", "audiobook", "ebook", "podcast", "shortFilm", "software", "all"] }
          },
          { "name": "country", "in": "query", "required": false, "schema": { "type": "string", "default": "US" } },
          { "name": "limit", "in": "query", "required": false, "schema": { "type": "integer", "minimum": 1, "maximum": 50, "default": 25 } }
        ],
        "responses": {
          "200": {
            "description": "Apple/iTunes candidates",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AppleItunesWishlistSearchResponse" }
              }
            }
          },
          "400": {
            "description": "Missing or invalid search term",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "401": {
            "description": "Authentication is required",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/wishlist/apple-itunes/save": {
      "post": {
        "tags": ["Wishlist"],
        "summary": "Save an Apple/iTunes candidate to the wishlist",
        "description": "Creates a scoped wanted item with provider='apple_itunes', or returns the existing scoped item when the Apple provider key is already saved.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/AppleItunesWishlistSaveInput" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Existing Apple/iTunes wishlist item returned",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AppleItunesWishlistSaveResponse" }
              }
            }
          },
          "201": {
            "description": "Apple/iTunes wishlist item created",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AppleItunesWishlistSaveResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid Apple/iTunes save payload",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/wishlist": {
      "get": {
        "tags": ["Wishlist"],
