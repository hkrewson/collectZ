    "/api/capture-items": {
      "get": {
        "tags": ["Capture"],
        "summary": "List mobile-first capture inbox records",
        "description": "Returns quick-capture records scoped to the authenticated user's active workspace/library. Supports status, capture_type, review_filter, source_filter, search, page, and limit query parameters.",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "parameters": [
          {
            "name": "status",
            "in": "query",
            "schema": { "type": "string", "enum": ["active", "new", "reviewed", "converted", "discarded", "all"] }
          },
          {
            "name": "capture_type",
            "in": "query",
            "schema": { "type": "string", "enum": ["barcode", "photo", "ocr_text", "manual_note"] }
          },
          {
            "name": "review_filter",
            "in": "query",
            "description": "Optional triage filter for the Capture Inbox review tabs.",
            "schema": { "type": "string", "enum": ["all", "needs_choice", "ready", "no_match", "missing_details", "problems"] }
          },
          {
            "name": "source_filter",
            "in": "query",
            "description": "Optional capture-source filter for scanner-app or web-origin captures.",
            "schema": { "type": "string", "enum": ["all", "scanner", "web"] }
          },
          {
            "name": "search",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "page",
            "in": "query",
            "schema": { "type": "integer", "minimum": 1, "default": 1 }
          },
          {
            "name": "limit",
            "in": "query",
            "schema": { "type": "integer", "minimum": 1, "maximum": 100, "default": 50 }
          }
        ],
        "responses": {
          "200": {
            "description": "Capture inbox records",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureListResponse" }
              }
            }
          },
          "401": {
            "description": "Authentication is required",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      },
      "post": {
        "tags": ["Capture"],
        "summary": "Create a quick-capture inbox record",
        "description": "Stores a barcode, photo reference, OCR text, or manual note for later review. Native/mobile clients remain capture surfaces; the backend owns the reviewable record. Supplying a client_capture_id makes queued/offline retries idempotent within the active scope.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/CaptureItemInput" }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Capture item created",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureItemResponse" }
              }
            }
          },
          "200": {
            "description": "Existing capture item reused for a repeated client_capture_id",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureItemResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid capture payload",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      }
    },
    "/api/capture-items/upload-image": {
      "post": {
        "tags": ["Capture"],
        "summary": "Upload a photo and create a quick-capture record",
        "description": "Accepts a multipart image upload from a mobile or web capture client, stores the image through the backend storage provider, and creates a scoped photo capture record for review. Supplying a client_capture_id makes repeated queued uploads idempotent; if the original image already exists the backend returns it instead of storing another copy.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "multipart/form-data": {
              "schema": {
                "type": "object",
                "properties": {
                  "image": { "type": "string", "format": "binary" },
                  "title": { "type": "string" },
                  "object_type": { "type": "string", "enum": ["movie", "tv_series", "book", "comic_book", "audio", "game", "art", "collectible", "event_item", "other"] },
                  "barcode": { "type": "string" },
                  "symbology": { "type": "string" },
                  "ocr_text": { "type": "string" },
                  "notes": { "type": "string" },
                  "client_capture_id": { "type": "string" },
                  "clientCaptureId": { "type": "string" },
                  "client_source": { "type": "string" },
                  "clientSource": { "type": "string" },
                  "source_context": { "type": "string", "description": "Optional JSON object encoded as a string." }
                },
                "required": ["image"]
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Photo capture created",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureImageUploadResponse" }
              }
            }
          },
          "200": {
            "description": "Existing photo capture reused for a repeated client_capture_id",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureImageUploadResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid upload payload",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      }
    },
    "/api/capture-items/{id}/ocr-text": {
      "post": {
        "tags": ["Capture"],
        "summary": "Store OCR text and extract reviewable identifier candidates",
        "description": "Accepts OCR text produced by a mobile or web capture client, stores it on the scoped capture row, and returns explicit ISBN/UPC/ASIN candidates for user review. The backend does not auto-import or silently apply a candidate.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "parameters": [
          { "name": "id", "in": "path", "required": true, "schema": { "type": "integer", "minimum": 1 } }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "ocr_text": { "type": "string" },
                  "text": { "type": "string" },
                  "source": { "type": "string" }
                },
                "additionalProperties": false
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OCR text stored and candidates extracted",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureOcrTextResponse" }
              }
            }
          },
          "400": {
            "description": "OCR text missing",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          },
          "404": {
            "description": "Capture item not found",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      }
    },
    "/api/capture-items/{id}/ocr-image": {
      "post": {
        "tags": ["Capture"],
        "summary": "Run backend OCR against an uploaded capture image",
        "description": "Reads an existing locally stored capture image through the backend, runs the configured vision OCR provider, stores extracted OCR text, and returns explicit ISBN/UPC/ASIN candidates for user review. The backend does not auto-import or silently apply a candidate.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "parameters": [
          { "name": "id", "in": "path", "required": true, "schema": { "type": "integer", "minimum": 1 } }
        ],
        "responses": {
          "200": {
            "description": "Image OCR completed and candidates extracted",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureOcrImageResponse" }
              }
            }
          },
          "400": {
            "description": "Capture image missing or not available to backend OCR",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          },
          "404": {
            "description": "Capture item not found",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          },
          "409": {
            "description": "Vision OCR provider is not configured or unsupported",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      }
    },
    "/api/capture-items/{id}/apply-ocr-candidate": {
      "post": {
        "tags": ["Capture"],
        "summary": "Apply a selected OCR identifier candidate to a capture",
        "description": "Applies an explicit user-selected OCR candidate to the capture barcode/symbology fields and records the selected candidate in review metadata.",
        "security": [
          { "cookieSession": [], "csrfHeader": [] },
          { "bearerAuth": [] }
        ],
        "parameters": [
          { "name": "id", "in": "path", "required": true, "schema": { "type": "integer", "minimum": 1 } }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "candidate_id": { "type": "string" },
                  "candidate": { "$ref": "#/components/schemas/CaptureOcrCandidate" }
                },
                "additionalProperties": false
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OCR candidate applied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CaptureOcrCandidateApplyResponse" }
              }
            }
          },
          "400": {
            "description": "OCR candidate missing",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          },
          "404": {
            "description": "Capture item not found",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Error" } } }
          }
        }
      }
