  "paths": {
    "/api/health": {
      "get": {
        "tags": ["Health"],
        "summary": "Read backend health metadata",
        "responses": {
          "200": {
            "description": "Healthy response",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Health" }
              }
            }
          }
        }
      }
    },
    "/api/auth/login": {
      "post": {
        "tags": ["Auth"],
        "summary": "Create a browser session",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/LoginRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Authenticated user payload",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/LoginResponse" }
              }
            }
          },
          "401": {
            "description": "Invalid credentials",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/register": {
      "post": {
        "tags": ["Auth"],
        "summary": "Create an account through public registration or invite claim",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/RegisterRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Invite or homelab registration succeeded and a browser session was issued",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/LoginResponse" }
              }
            }
          },
          "201": {
            "description": "Public SaaS registration succeeded and email verification is still required",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/VerificationPendingResponse" }
              }
            }
          },
          "202": {
            "description": "Account created but verification email delivery still needs operator attention",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/VerificationPendingResponse" }
              }
            }
          },
          "400": {
            "description": "Invite required or invalid input",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "409": {
            "description": "Account already exists",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "503": {
            "description": "Public registration unavailable until email verification delivery is configured",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/config": {
      "get": {
        "tags": ["Auth"],
        "summary": "Read public auth-surface availability settings",
        "responses": {
          "200": {
            "description": "Public auth availability state",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthConfigResponse" }
              }
            }
          }
        }
      }
    },
    "/api/auth/email-verification/request": {
      "post": {
        "tags": ["Auth"],
        "summary": "Request a fresh email verification link",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/EmailVerificationRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Generic verification resend acceptance response",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/MessageResponse" }
              }
            }
          }
        }
      }
    },
    "/api/auth/email-verification/consume": {
      "post": {
        "tags": ["Auth"],
        "summary": "Consume a one-time email verification token",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/EmailVerificationConsumeRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Email verification succeeded and a new browser session was issued",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/LoginResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid or expired token, or email mismatch",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/password-reset/request": {
      "post": {
        "tags": ["Auth"],
        "summary": "Request a password reset email",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/PasswordResetRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Generic password reset acceptance response",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/MessageResponse" }
              }
            }
          },
          "400": {
            "description": "Validation failed",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/password-reset/consume": {
      "post": {
        "tags": ["Auth"],
        "summary": "Consume a one-time password reset token",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/PasswordResetConsumeRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Password reset succeeded and a new browser session was issued",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/LoginResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid or expired token, or email mismatch",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/me": {
      "get": {
        "tags": ["Auth"],
        "summary": "Read the current authenticated user",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "responses": {
          "200": {
            "description": "Current user",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/User" }
              }
            }
          },
          "401": {
