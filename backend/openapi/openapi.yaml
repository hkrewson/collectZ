              "application/json": {
                "schema": { "$ref": "#/components/schemas/BarcodeLookupResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid barcode lookup request",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
