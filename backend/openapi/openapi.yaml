              "client_capture_id": { "type": ["string", "null"] }
            },
            "additionalProperties": true
          },
          "replay_conflicts": {
            "type": "array",
            "description": "Fields that differed from the existing row during an idempotent upload replay and were preserved for review instead of silently overwriting.",
            "items": {
              "type": "object",
              "properties": {
                "field": { "type": "string" },
                "existing": { "type": ["string", "null"] },
                "incoming": { "type": ["string", "null"] }
              },
              "required": ["field", "existing", "incoming"]
            }
          }
        },
        "required": ["item", "upload"]
      },
      "CaptureOcrCandidate": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "source": { "type": "string", "enum": ["ocr"] },
          "match_type": { "type": "string", "enum": ["isbn", "upc", "ean", "asin"] },
          "value": { "type": "string" },
          "barcode": { "type": "string" },
          "symbology": { "type": "string" },
          "media_type": { "type": "string", "enum": ["book", "other"] },
          "label": { "type": "string" },
          "rank": { "type": "integer" },
          "context": { "type": "string" }
        },
        "required": ["id", "source", "match_type", "value", "barcode", "symbology", "media_type", "label"]
      },
      "CaptureOcrTextResponse": {
        "type": "object",
        "properties": {
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "candidates": { "type": "array", "items": { "$ref": "#/components/schemas/CaptureOcrCandidate" } },
          "parsed": { "type": "object", "additionalProperties": true }
        },
        "required": ["item", "candidates", "parsed"]
      },
      "CaptureOcrImageResponse": {
        "type": "object",
        "properties": {
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "candidates": { "type": "array", "items": { "$ref": "#/components/schemas/CaptureOcrCandidate" } },
          "parsed": { "type": "object", "additionalProperties": true },
          "ocr": {
            "type": "object",
            "properties": {
              "provider": { "type": "string" },
              "text_length": { "type": "integer" }
            },
            "required": ["provider", "text_length"]
          }
        },
        "required": ["item", "candidates", "parsed", "ocr"]
      },
      "CaptureOcrCandidateApplyResponse": {
        "type": "object",
        "properties": {
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "candidate": { "$ref": "#/components/schemas/CaptureOcrCandidate" }
        },
        "required": ["item", "candidate"]
      },
      "CaptureLookupMatchesResponse": {
        "type": "object",
        "properties": {
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "matches": { "type": "array", "items": { "$ref": "#/components/schemas/BarcodeLookupMatch" } },
          "lookup": {
            "type": "object",
            "properties": {
              "provider": { "type": ["string", "null"] },
              "barcode": { "type": "string" },
              "symbology": { "type": ["string", "null"] },
              "count": { "type": "integer" },
              "catalog_count": { "type": "integer" },
              "provider_count": { "type": "integer" },
              "provider_error": { "type": ["string", "null"] }
            },
            "required": ["barcode", "count", "catalog_count", "provider_count"]
          }
        },
        "required": ["item", "matches", "lookup"]
      },
      "CaptureImportMatchResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "import": {
            "type": "object",
            "properties": {
              "ok": { "type": "boolean" },
              "status": { "type": "string", "enum": ["existing", "created", "updated"] },
              "action": { "type": "string", "enum": ["matched_existing", "created", "updated"] },
              "media_id": { "type": "integer" },
              "media": { "type": ["object", "null"], "additionalProperties": true },
              "barcode": { "type": ["string", "null"] },
              "matched_by": { "type": ["string", "null"] },
              "match_mode": { "type": ["string", "null"] },
              "enrichment_status": { "type": ["string", "null"] },
              "lookup_path": { "type": ["string", "null"] },
              "lookup_status": { "type": ["string", "null"] }
            },
            "required": ["ok", "status", "action", "media_id"]
          },
          "match": { "$ref": "#/components/schemas/BarcodeLookupMatch" }
        },
        "required": ["ok", "item", "import", "match"]
      },
      "CaptureReplayConflictResolveResponse": {
        "type": "object",
        "properties": {
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "resolution": {
            "type": "object",
            "properties": {
              "action": { "type": "string", "enum": ["keep_existing", "apply_incoming"] },
              "applied_fields": { "type": "array", "items": { "type": "string" } }
            },
            "required": ["action", "applied_fields"]
          }
        },
        "required": ["item", "resolution"]
      },
      "CaptureWishlistConvertResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "item": { "$ref": "#/components/schemas/CaptureItem" },
          "wanted_item": { "$ref": "#/components/schemas/WantedItem" }
        },
        "required": ["ok", "item", "wanted_item"]
      }
    }
  },
  "paths": {
