            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/scope": {
      "get": {
        "tags": ["Auth"],
        "summary": "Read the current session context bootstrap contract",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "responses": {
          "200": {
            "description": "Current session context",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
            }
          },
          "401": {
            "description": "Unauthenticated",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      },
      "post": {
        "tags": ["Auth"],
        "summary": "Select the current active space and library for a non-admin session user",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/AuthScopeSelectRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated session context",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
