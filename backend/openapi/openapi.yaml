{
  "openapi": "3.1.0",
  "info": {
    "title": "collectZ API",
    "version": "2.5.0",
    "description": "Baseline OpenAPI contract for key auth, admin, and media endpoints."
  },
  "servers": [
    {
      "url": "/",
      "description": "Same-origin API server"
    }
  ],
  "tags": [
    { "name": "Health" },
    { "name": "Auth" },
    { "name": "Admin" },
    { "name": "Media" },
    { "name": "Observability" }
  ],
  "components": {
    "securitySchemes": {
      "cookieSession": {
        "type": "apiKey",
        "in": "cookie",
        "name": "session_token",
        "description": "Browser session cookie."
      },
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "PAT or service-account key"
      },
      "csrfHeader": {
        "type": "apiKey",
        "in": "header",
        "name": "X-CSRF-Token",
        "description": "Required for mutating cookie-session requests."
      }
    },
    "schemas": {
      "Error": {
        "type": "object",
        "properties": {
          "error": { "type": "string" }
        },
        "required": ["error"],
        "additionalProperties": true
      },
      "Health": {
        "type": "object",
        "properties": {
          "status": { "type": "string", "example": "ok" },
          "app": { "type": "string" },
          "version": { "type": "string" },
          "frontend": { "type": "string" },
          "backend": { "type": "string" },
          "build": { "type": "string" }
        },
        "required": ["status", "app", "version", "frontend", "backend", "build"]
      },
      "User": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "email": { "type": "string", "format": "email" },
          "name": { "type": "string" },
          "role": { "type": "string" },
          "active_space_id": { "type": ["integer", "null"] },
          "active_library_id": { "type": ["integer", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "email", "name", "role"]
      },
      "SpaceSummary": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "is_personal": { "type": "boolean" },
          "membership_role": { "type": ["string", "null"] },
          "library_count": { "type": "integer" }
        },
        "required": ["id", "name", "is_personal", "library_count"]
      },
      "LibrarySummary": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "description": { "type": ["string", "null"] },
          "space_id": { "type": ["integer", "null"] },
          "created_by": { "type": ["integer", "null"] },
          "created_by_email": { "type": ["string", "null"] },
          "created_by_name": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "item_count": { "type": "integer" }
        },
        "required": ["id", "name", "created_at", "updated_at", "item_count"]
      },
      "AuthScopeResponse": {
        "type": "object",
        "properties": {
          "active_space_id": { "type": ["integer", "null"] },
          "active_library_id": { "type": ["integer", "null"] },
          "spaces": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceSummary" }
          },
          "libraries": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/LibrarySummary" }
          }
        },
        "required": ["spaces", "libraries"]
      },
      "AuthScopeSelectRequest": {
        "type": "object",
        "properties": {
          "space_id": { "type": "integer", "minimum": 1 },
          "library_id": { "type": "integer", "minimum": 1 }
        },
        "minProperties": 1
      },
      "SpaceRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "created_by": { "type": ["integer", "null"] },
          "is_personal": { "type": "boolean" },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "membership_role": { "type": ["string", "null"] },
          "library_count": { "type": ["integer", "null"] }
        },
        "required": ["id", "name", "is_personal", "created_at", "updated_at"]
      },
      "SpaceListResponse": {
        "type": "object",
        "properties": {
          "spaces": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceRecord" }
          }
        },
        "required": ["spaces"]
      },
      "SpaceMembershipRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "space_id": { "type": "integer" },
          "user_id": { "type": "integer" },
          "role": { "type": "string" },
          "created_by": { "type": ["integer", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "email": { "type": ["string", "null"] },
          "name": { "type": ["string", "null"] },
          "user_role": { "type": ["string", "null"] }
        },
        "required": ["id", "space_id", "user_id", "role", "created_at", "updated_at"]
      },
      "SpaceMembershipListResponse": {
        "type": "object",
        "properties": {
          "space": {
            "type": "object",
            "properties": {
              "id": { "type": "integer" },
              "name": { "type": "string" },
              "slug": { "type": ["string", "null"] },
              "membership_role": { "type": ["string", "null"] }
            },
            "required": ["id", "name"]
          },
          "members": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceMembershipRecord" }
          }
        },
        "required": ["space", "members"]
      },
      "SpaceCreateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "owner_user_id": { "type": "integer", "minimum": 1 }
        },
        "required": ["name"]
      },
      "SpaceUpdateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] }
        },
        "minProperties": 1
      },
      "SpaceMembershipCreateRequest": {
        "type": "object",
        "properties": {
          "user_id": { "type": "integer", "minimum": 1 },
          "role": { "type": "string", "enum": ["owner", "admin", "member", "viewer"] }
        },
        "required": ["user_id", "role"]
      },
      "SpaceMembershipUpdateRequest": {
        "type": "object",
        "properties": {
          "role": { "type": "string", "enum": ["owner", "admin", "member", "viewer"] }
        },
        "required": ["role"]
      },
      "SpaceInviteRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "email": { "type": "string", "format": "email" },
          "used": { "type": "boolean" },
          "revoked": { "type": "boolean" },
          "used_by": { "type": ["integer", "null"] },
          "used_at": { "type": ["string", "null"], "format": "date-time" },
          "expires_at": { "type": "string", "format": "date-time" },
          "created_at": { "type": "string", "format": "date-time" },
          "space_id": { "type": ["integer", "null"] },
          "space_role": { "type": ["string", "null"], "enum": ["owner", "admin", "member", "viewer", null] },
          "created_by_email": { "type": ["string", "null"] },
          "used_by_email": { "type": ["string", "null"] }
        },
        "required": ["id", "email", "used", "revoked", "expires_at", "created_at"]
      },
      "SpaceInviteListResponse": {
        "type": "object",
        "properties": {
          "space": {
            "type": "object",
            "properties": {
              "id": { "type": "integer" },
              "name": { "type": "string" },
              "slug": { "type": ["string", "null"] },
              "membership_role": { "type": ["string", "null"] }
            },
            "required": ["id", "name"]
          },
          "invites": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceInviteRecord" }
          }
        },
        "required": ["space", "invites"]
      },
      "SpaceInviteCreateRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" },
          "role": { "type": "string", "enum": ["owner", "admin", "member", "viewer"] },
          "expose_token": { "type": "boolean" }
        },
        "required": ["email", "role"]
      },
      "SpaceTransferCreateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] }
        },
        "required": ["name"]
      },
      "SpaceTransferResponse": {
        "type": "object",
        "properties": {
          "source_space_id": { "type": "integer" },
          "target_space": { "$ref": "#/components/schemas/SpaceRecord" },
          "moved_library_ids": {
            "type": "array",
            "items": { "type": "integer" }
          },
          "removed_from_source_space": { "type": "boolean" }
        },
        "required": ["source_space_id", "target_space", "moved_library_ids", "removed_from_source_space"]
      },
      "LoginRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" },
          "password": { "type": "string" }
        },
        "required": ["email", "password"]
      },
      "LoginResponse": {
        "type": "object",
        "properties": {
          "user": { "$ref": "#/components/schemas/User" }
        },
        "required": ["user"]
      },
      "NamedTokenRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "expires_at": { "type": ["string", "null"], "format": "date-time" },
          "last_used_at": { "type": ["string", "null"], "format": "date-time" },
          "revoked_at": { "type": ["string", "null"], "format": "date-time" },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "name", "created_at", "updated_at"]
      },
      "PersonalAccessTokenRecord": {
        "allOf": [
          { "$ref": "#/components/schemas/NamedTokenRecord" },
          {
            "type": "object",
            "properties": {
              "user_id": { "type": "integer" },
              "token_last_four": { "type": "string" },
              "scopes": {
                "type": "array",
                "items": { "type": "string" }
              }
            },
            "required": ["user_id", "token_last_four", "scopes"]
          }
        ]
      },
      "ServiceAccountKeyRecord": {
        "allOf": [
          { "$ref": "#/components/schemas/NamedTokenRecord" },
          {
            "type": "object",
            "properties": {
              "owner_user_id": { "type": "integer" },
              "created_by_user_id": { "type": ["integer", "null"] },
              "key_last_four": { "type": "string" },
              "scopes": {
                "type": "array",
                "items": { "type": "string" }
              },
              "allowed_prefixes": {
                "type": "array",
                "items": { "type": "string" }
              }
            },
            "required": ["owner_user_id", "key_last_four", "scopes", "allowed_prefixes"]
          }
        ]
      },
      "PersonalAccessTokenCreateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "scopes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "expires_at": { "type": ["string", "null"], "format": "date-time" }
        },
        "required": ["name"]
      },
      "ServiceAccountKeyCreateRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "scopes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "allowed_prefixes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "expires_at": { "type": ["string", "null"], "format": "date-time" }
        },
        "required": ["name"]
      },
      "PersonalAccessTokenListResponse": {
        "type": "object",
        "properties": {
          "scopes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "tokens": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/PersonalAccessTokenRecord" }
          }
        },
        "required": ["scopes", "tokens"]
      },
      "PersonalAccessTokenCreateResponse": {
        "type": "object",
        "properties": {
          "token": { "type": "string" },
          "record": { "$ref": "#/components/schemas/PersonalAccessTokenRecord" }
        },
        "required": ["token", "record"]
      },
      "ServiceAccountKeyListResponse": {
        "type": "object",
        "properties": {
          "scopes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "allowed_prefixes": {
            "type": "array",
            "items": { "type": "string" }
          },
          "keys": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/ServiceAccountKeyRecord" }
          }
        },
        "required": ["scopes", "allowed_prefixes", "keys"]
      },
      "ServiceAccountKeyCreateResponse": {
        "type": "object",
        "properties": {
          "key": { "type": "string" },
          "record": { "$ref": "#/components/schemas/ServiceAccountKeyRecord" }
        },
        "required": ["key", "record"]
      },
      "InviteCreateRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" },
          "expose_token": { "type": "boolean", "description": "Explicitly reveal token and invite_url in the response for admin copy-link fallback." }
        },
        "required": ["email"]
      },
      "InviteCreateResponse": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "email": { "type": "string", "format": "email" },
          "used": { "type": "boolean" },
          "revoked": { "type": "boolean" },
          "used_by": { "type": ["integer", "null"] },
          "used_at": { "type": ["string", "null"], "format": "date-time" },
          "expires_at": { "type": "string", "format": "date-time" },
          "created_at": { "type": "string", "format": "date-time" },
          "space_id": { "type": ["integer", "null"] },
          "space_role": { "type": ["string", "null"] },
          "delivery": {
            "type": "object",
            "properties": {
              "attempted": { "type": "boolean" },
              "sent": { "type": "boolean" },
              "reason": { "type": ["string", "null"] }
            },
            "required": ["attempted", "sent"]
          },
          "token": { "type": "string" },
          "invite_url": { "type": "string" }
        },
        "required": ["id", "email", "used", "revoked", "expires_at", "created_at", "delivery"]
      },
      "MediaListResponse": {
        "type": "object",
        "properties": {
          "items": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": { "type": "integer" },
                "title": { "type": "string" },
                "media_type": { "type": "string" },
                "year": { "type": ["integer", "null"] },
                "library_id": { "type": ["integer", "null"] },
                "tmdb_id": { "type": ["integer", "null"] },
                "tmdb_media_type": { "type": ["string", "null"] },
                "poster_path": { "type": ["string", "null"] }
              },
              "required": ["id", "title", "media_type"]
            }
          },
          "pagination": {
            "type": "object",
            "properties": {
              "page": { "type": "integer" },
              "limit": { "type": "integer" },
              "total": { "type": "integer" },
              "totalPages": { "type": "integer" },
              "hasMore": { "type": "boolean" }
            },
            "required": ["page", "limit", "total", "totalPages", "hasMore"]
          }
        },
        "required": ["items", "pagination"]
      },
      "SyncJobResponse": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "provider": { "type": ["string", "null"] },
          "status": { "type": "string" },
          "summary": { "type": "object" },
          "progress": { "type": "object" },
          "error": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "status", "summary", "progress", "created_at", "updated_at"]
      },
      "QueuedJobResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "queued": { "type": "boolean" },
          "provider": { "type": ["string", "null"] },
          "job_id": { "type": "integer" },
          "status": { "type": "string" },
          "status_url": { "type": "string" },
          "job": {
            "type": "object",
            "properties": {
              "id": { "type": "integer" },
              "status": { "type": "string" },
              "provider": { "type": ["string", "null"] },
              "progress": { "type": "object" }
            },
            "required": ["id", "status", "progress"]
          }
        },
        "required": ["ok", "queued", "job_id", "status", "status_url", "job"]
      },
      "MetricsText": {
        "type": "string",
        "description": "Prometheus text exposition format."
      }
    }
  },
  "paths": {
    "/api/health": {
      "get": {
        "tags": ["Health"],
        "summary": "Read backend health metadata",
        "responses": {
          "200": {
            "description": "Healthy response",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Health" }
              }
            }
          }
        }
      }
    },
    "/api/auth/login": {
      "post": {
        "tags": ["Auth"],
        "summary": "Create a browser session",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/LoginRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Authenticated user payload",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/LoginResponse" }
              }
            }
          },
          "401": {
            "description": "Invalid credentials",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/me": {
      "get": {
        "tags": ["Auth"],
        "summary": "Read the current authenticated user",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "responses": {
          "200": {
            "description": "Current user",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "user": { "$ref": "#/components/schemas/User" }
                  },
                  "required": ["user"]
                }
              }
            }
          },
          "401": {
            "description": "Unauthenticated",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/scope": {
      "get": {
        "tags": ["Auth"],
        "summary": "Read the current active scope bootstrap contract",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "responses": {
          "200": {
            "description": "Active auth scope",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
            }
          },
          "401": {
            "description": "Unauthenticated",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      },
      "post": {
        "tags": ["Auth"],
        "summary": "Select the current active space and library for the session user",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/AuthScopeSelectRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated active auth scope",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
            }
          },
          "400": {
            "description": "Validation failed",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "403": {
            "description": "Scope selection denied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/spaces": {
      "get": {
        "tags": ["Auth"],
        "summary": "List spaces accessible to the current user",
        "security": [
          { "cookieSession": [] },
          { "bearerAuth": [] }
        ],
        "responses": {
          "200": {
            "description": "Accessible spaces",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SpaceListResponse" }
              }
            }
          }
        }
      },
      "post": {
        "tags": ["Auth"],
        "summary": "Create a new space as a global admin",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/SpaceCreateRequest" }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Space created",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SpaceRecord" }
              }
            }
          },
          "403": {
            "description": "Creation denied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/spaces/select": {
      "post": {
        "tags": ["Auth"],
        "summary": "Select the active space for the current user",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "space_id": { "type": "integer", "minimum": 1 }
                },
                "required": ["space_id"]
              }
            }
          }
        },
        "responses": {
          "200": {
