          },
          "403": {
            "description": "Scope selection denied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
    "/api/auth/support-session/start": {
      "post": {
        "tags": ["Auth"],
        "summary": "Start an explicit admin support session for a target space",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/SupportSessionStartRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Support session started",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
            }
          },
          "400": {
            "description": "Validation failed",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "403": {
            "description": "Support session denied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          },
          "404": {
            "description": "Target space or session not found",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
