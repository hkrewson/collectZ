        "responses": {
          "201": {
            "description": "Wishlist item created",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/WantedItemResponse" }
              }
            }
          },
          "400": {
            "description": "Invalid wishlist payload",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
          }
        }
      }
    },
