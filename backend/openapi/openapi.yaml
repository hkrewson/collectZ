{
  "openapi": "3.1.0",
  "info": {
    "title": "collectZ API",
    "version": "2.5.0",
    "description": "Baseline OpenAPI contract for key auth, admin, and media endpoints."
  },
  "servers": [
    {
      "url": "/",
      "description": "Same-origin API server"
    }
  ],
  "tags": [
    { "name": "Health" },
    { "name": "Auth" },
    { "name": "Admin" },
    { "name": "Support" },
    { "name": "Media" },
    { "name": "Observability" }
  ],
  "components": {
    "securitySchemes": {
      "cookieSession": {
        "type": "apiKey",
        "in": "cookie",
        "name": "session_token",
        "description": "Browser session cookie."
      },
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "PAT or service-account key"
      },
      "csrfHeader": {
        "type": "apiKey",
        "in": "header",
        "name": "X-CSRF-Token",
        "description": "Required for mutating cookie-session requests."
      }
    },
    "schemas": {
      "Error": {
        "type": "object",
        "properties": {
          "error": { "type": "string" }
        },
        "required": ["error"],
        "additionalProperties": true
      },
      "ActivityEntry": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "user_id": { "type": ["integer", "null"] },
          "user_email": { "type": ["string", "null"], "format": "email" },
          "action": { "type": "string" },
          "entity_type": { "type": ["string", "null"] },
          "entity_id": { "type": ["integer", "null"] },
          "details": { "type": ["object", "null"], "additionalProperties": true },
          "details_reason": { "type": ["string", "null"] },
          "details_status": { "type": ["string", "null"] },
          "ip_address": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "action", "created_at"]
      },
      "IntegrationSettingsResponse": {
        "type": "object",
        "additionalProperties": true
      },
      "Health": {
        "type": "object",
        "properties": {
          "status": { "type": "string", "example": "ok" },
          "app": { "type": "string" },
          "version": { "type": "string" },
          "frontend": { "type": "string" },
          "backend": { "type": "string" },
          "build": { "type": "string" }
        },
        "required": ["status", "app", "version", "frontend", "backend", "build"]
      },
      "User": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "email": { "type": "string", "format": "email" },
          "name": { "type": "string" },
          "role": { "type": "string" },
          "email_verified": { "type": "boolean" },
          "email_verified_at": { "type": ["string", "null"], "format": "date-time" },
          "product_edition": { "type": "string", "enum": ["platform", "homelab"] },
          "active_space_id": { "type": ["integer", "null"] },
          "active_library_id": { "type": ["integer", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "email", "name", "role"]
      },
      "SpaceSummary": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "is_personal": { "type": "boolean" },
          "membership_role": { "type": ["string", "null"] },
          "library_count": { "type": "integer" }
        },
        "required": ["id", "name", "is_personal", "library_count"]
      },
      "LibrarySummary": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "description": { "type": ["string", "null"] },
          "space_id": { "type": ["integer", "null"] },
          "created_by": { "type": ["integer", "null"] },
          "created_by_email": { "type": ["string", "null"] },
          "created_by_name": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "item_count": { "type": "integer" }
        },
        "required": ["id", "name", "created_at", "updated_at", "item_count"]
      },
      "AuthScopeResponse": {
        "type": "object",
        "properties": {
          "active_space_id": { "type": ["integer", "null"] },
          "active_library_id": { "type": ["integer", "null"] },
          "support_session": {
            "oneOf": [
              { "$ref": "#/components/schemas/SupportSessionRecord" },
              { "type": "null" }
            ]
          },
          "spaces": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceSummary" }
          },
          "libraries": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/LibrarySummary" }
          }
        },
        "required": ["spaces", "libraries"]
      },
      "AuthConfigResponse": {
        "type": "object",
        "properties": {
          "product_edition": { "type": "string", "enum": ["platform", "homelab"] },
          "register_available": { "type": "boolean" },
          "invite_required": { "type": "boolean" },
          "first_user_bootstrap": { "type": "boolean" },
          "password_reset_available": { "type": "boolean" },
          "email_verification_required": { "type": "boolean" },
          "smtp_configured": { "type": ["boolean", "null"] }
        },
        "required": ["product_edition", "register_available", "invite_required", "first_user_bootstrap", "password_reset_available", "email_verification_required", "smtp_configured"]
      },
      "EmailVerificationRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" }
        },
        "required": ["email"]
      },
      "EmailVerificationConsumeRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" },
          "token": { "type": "string" }
        },
        "required": ["email", "token"]
      },
      "VerificationPendingResponse": {
        "type": "object",
        "properties": {
          "message": { "type": "string" },
          "verification_required": { "type": "boolean" },
          "email": { "type": "string", "format": "email" }
        },
        "required": ["message", "verification_required", "email"]
      },
      "AuthScopeSelectRequest": {
        "type": "object",
        "properties": {
          "space_id": { "type": "integer", "minimum": 1 },
          "library_id": { "type": "integer", "minimum": 1 }
        },
        "minProperties": 1
      },
      "SupportSessionRecord": {
        "type": "object",
        "properties": {
          "active": { "type": "boolean" },
          "space_id": { "type": ["integer", "null"] },
          "library_id": { "type": ["integer", "null"] },
          "started_at": { "type": ["string", "null"], "format": "date-time" },
          "reason": { "type": ["string", "null"] },
          "request_id": { "type": ["integer", "null"] },
          "request_key": { "type": ["string", "null"] },
          "request_subject": { "type": ["string", "null"] },
          "requester_user_id": { "type": ["integer", "null"] },
          "requester_name": { "type": ["string", "null"] },
          "requester_email": { "type": ["string", "null"], "format": "email" },
          "previous_space_id": { "type": ["integer", "null"] },
          "previous_library_id": { "type": ["integer", "null"] },
          "space_name": { "type": ["string", "null"] },
          "library_name": { "type": ["string", "null"] }
        },
        "required": ["active"]
      },
      "SupportSessionStartRequest": {
        "type": "object",
        "properties": {
          "space_id": { "type": "integer", "minimum": 1 },
          "library_id": { "type": "integer", "minimum": 1 },
          "request_id": { "type": "integer", "minimum": 1 },
          "reason": { "type": ["string", "null"], "maxLength": 500 }
        },
        "required": ["space_id"]
      },
      "SupportRequestRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "request_key": { "type": ["string", "null"] },
          "subject": { "type": "string" },
          "status": { "type": "string", "enum": ["open", "answered", "closed"] },
          "classification": { "type": "string", "enum": ["support", "bug", "feature_request"] },
          "tracking_status": { "type": "string", "enum": ["untracked", "investigating", "planned", "in_progress", "shipped", "declined"] },
          "support_access_status": { "type": "string", "enum": ["not_requested", "approved", "revoked", "expired"] },
          "support_access_approved_at": { "type": ["string", "null"], "format": "date-time" },
          "support_access_expires_at": { "type": ["string", "null"], "format": "date-time" },
          "support_access_approved_by_user_id": { "type": ["integer", "null"] },
          "resolved_in_version": { "type": ["string", "null"] },
          "repo_issue_number": { "type": ["integer", "null"] },
          "repo_issue_url": { "type": ["string", "null"], "format": "uri" },
          "internal_notes": { "type": ["string", "null"] },
          "target_space_id": { "type": ["integer", "null"] },
          "target_space_name": { "type": ["string", "null"] },
          "target_library_id": { "type": ["integer", "null"] },
          "target_library_name": { "type": ["string", "null"] },
          "requester_user_id": { "type": ["integer", "null"] },
          "requester_name": { "type": ["string", "null"] },
          "requester_email": { "type": ["string", "null"], "format": "email" },
          "message_count": { "type": "integer" },
          "last_message_at": { "type": ["string", "null"], "format": "date-time" },
          "last_message_by_role": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "subject", "status", "message_count", "created_at", "updated_at"]
      },
      "SupportRequestMessageRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "request_id": { "type": "integer" },
          "request_key": { "type": ["string", "null"] },
          "author_user_id": { "type": ["integer", "null"] },
          "author_role": { "type": "string" },
          "is_internal": { "type": "boolean" },
          "author_name": { "type": ["string", "null"] },
          "author_email": { "type": ["string", "null"], "format": "email" },
          "body": { "type": "string" },
          "created_at": { "type": "string", "format": "date-time" }
        },
        "required": ["id", "request_id", "author_role", "body", "created_at"]
      },
      "SupportRequestListResponse": {
        "type": "object",
        "properties": {
          "requests": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SupportRequestRecord" }
          },
          "support_staff": { "type": "boolean" }
        },
        "required": ["requests", "support_staff"]
      },
      "SupportRequestDetailResponse": {
        "type": "object",
        "properties": {
          "request": { "$ref": "#/components/schemas/SupportRequestRecord" },
          "messages": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SupportRequestMessageRecord" }
          },
          "timeline": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SupportTimelineEventRecord" }
          }
        },
        "required": ["request", "messages", "timeline"]
      },
      "SupportTimelineEventRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "action": { "type": "string" },
          "category": { "type": "string", "enum": ["request", "access", "session", "triage"] },
          "title": { "type": "string" },
          "body": { "type": ["string", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "actor_name": { "type": ["string", "null"] },
          "actor_email": { "type": ["string", "null"], "format": "email" },
          "request_id": { "type": ["integer", "null"] },
          "request_key": { "type": ["string", "null"] },
          "is_internal": { "type": "boolean" }
        },
        "required": ["id", "action", "category", "title", "created_at", "is_internal"]
      },
      "SupportRequestCreateRequest": {
        "type": "object",
        "properties": {
          "subject": { "type": "string", "minLength": 3, "maxLength": 255 },
          "message": { "type": "string", "minLength": 10, "maxLength": 4000 },
          "target_space_id": { "type": ["integer", "null"], "minimum": 1 },
          "target_library_id": { "type": ["integer", "null"], "minimum": 1 }
        },
        "required": ["subject", "message"]
      },
      "SupportRequestMessageCreateRequest": {
        "type": "object",
        "properties": {
          "body": { "type": "string", "minLength": 1, "maxLength": 4000 }
        },
        "required": ["body"]
      },
      "SupportRequestStatusUpdateRequest": {
        "type": "object",
        "properties": {
          "status": { "type": "string", "enum": ["open", "answered", "closed"] }
        },
        "required": ["status"]
      },
      "SupportRequestAccessUpdateRequest": {
        "type": "object",
        "properties": {
          "support_access_status": { "type": "string", "enum": ["approved", "revoked"] }
        },
        "required": ["support_access_status"]
      },
      "SupportRequestTriageUpdateRequest": {
        "type": "object",
        "properties": {
          "classification": { "type": "string", "enum": ["support", "bug", "feature_request"] },
          "tracking_status": { "type": ["string", "null"], "enum": ["untracked", "investigating", "planned", "in_progress", "shipped", "declined", null] },
          "internal_notes": { "type": ["string", "null"], "maxLength": 8000 },
          "repo_issue_number": { "type": ["integer", "null"], "minimum": 1 },
          "repo_issue_url": { "type": ["string", "null"], "format": "uri", "maxLength": 1000 },
          "resolved_in_version": { "type": ["string", "null"], "maxLength": 32 }
        },
        "minProperties": 1
      },
      "SupportRequestMutationResponse": {
        "type": "object",
        "properties": {
          "request": { "$ref": "#/components/schemas/SupportRequestRecord" },
          "message": {
            "oneOf": [
              { "$ref": "#/components/schemas/SupportRequestMessageRecord" },
              { "type": "null" }
            ]
          },
          "internal_note_message": {
            "oneOf": [
              { "$ref": "#/components/schemas/SupportRequestMessageRecord" },
              { "type": "null" }
            ]
          }
        },
        "required": ["request"]
      },
      "SupportStaffSummaryResponse": {
        "type": "object",
        "properties": {
          "queue": {
            "type": "object",
            "properties": {
              "open": { "type": "integer" },
              "answered": { "type": "integer" },
              "closed": { "type": "integer" },
              "bugs": { "type": "integer" },
              "features": { "type": "integer" }
            },
            "required": ["open", "answered", "closed", "bugs", "features"]
          },
          "metrics": {
            "type": "object",
            "properties": {
              "time_to_open_seconds": { "type": "number" },
              "time_to_close_seconds": { "type": "number" },
              "closed_this_month": { "type": "integer" }
            },
            "required": ["time_to_open_seconds", "time_to_close_seconds", "closed_this_month"]
          }
        },
        "required": ["queue", "metrics"]
      },
      "SupportReleaseEntry": {
        "type": "object",
        "properties": {
          "title": { "type": "string" },
          "version": { "type": "string" },
          "date": { "type": ["string", "null"] },
          "status": { "type": ["string", "null"] },
          "summary": { "type": "string" },
          "details": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "heading": { "type": "string" },
                "bullets": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              },
              "required": ["heading", "bullets"]
            }
          }
        },
        "required": ["title", "version", "date", "status", "summary", "details"]
      },
      "SupportReleaseFeedResponse": {
        "type": "object",
        "properties": {
          "releases": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SupportReleaseEntry" }
          }
        },
        "required": ["releases"]
      },
      "SpaceRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "created_by": { "type": ["integer", "null"] },
          "is_personal": { "type": "boolean" },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "membership_role": { "type": ["string", "null"] },
          "library_count": { "type": ["integer", "null"] }
        },
        "required": ["id", "name", "is_personal", "created_at", "updated_at"]
      },
      "SpaceListResponse": {
        "type": "object",
        "properties": {
          "spaces": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceRecord" }
          }
        },
        "required": ["spaces"]
      },
      "AdminSpaceRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "created_by": { "type": ["integer", "null"] },
          "created_by_email": { "type": ["string", "null"] },
          "is_personal": { "type": "boolean" },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "archived_at": { "type": ["string", "null"], "format": "date-time" },
          "member_count": { "type": "integer" },
          "library_count": { "type": "integer" },
          "owner_count": { "type": "integer" },
          "owners": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "user_id": { "type": ["integer", "null"] },
                "email": { "type": ["string", "null"] },
                "name": { "type": ["string", "null"] }
              }
            }
          }
        },
        "required": ["id", "name", "is_personal", "created_at", "updated_at", "member_count", "library_count", "owner_count", "owners"]
      },
      "AdminSpaceListResponse": {
        "type": "object",
        "properties": {
          "spaces": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/AdminSpaceRecord" }
          }
        },
        "required": ["spaces"]
      },
      "AdminSpaceDetailResponse": {
        "type": "object",
        "properties": {
          "space": { "$ref": "#/components/schemas/AdminSpaceRecord" },
          "libraries": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/LibraryRecord" }
          },
          "members": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceMembershipRecord" }
          },
          "invites": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/SpaceInviteRecord" }
          }
        },
        "required": ["space", "libraries", "members", "invites"]
      },
      "AdminSpaceOwnerAssignRequest": {
        "type": "object",
        "properties": {
          "owner_user_id": { "type": "integer", "minimum": 1 }
        },
        "required": ["owner_user_id"]
      },
      "AdminSpaceArchiveRequest": {
        "type": "object",
        "properties": {
          "archived": { "type": "boolean" }
        },
        "required": ["archived"]
      },
      "AdminSpaceInitialInviteRequest": {
        "type": "object",
        "properties": {
          "email": { "type": "string", "format": "email" },
          "role": { "type": "string", "enum": ["owner", "admin", "member", "viewer"] },
          "expose_token": { "type": "boolean" }
        },
        "required": ["email", "role"]
      },
      "AdminSpaceCreateWithOnboardingRequest": {
        "type": "object",
        "properties": {
          "name": { "type": "string" },
          "slug": { "type": ["string", "null"] },
          "description": { "type": ["string", "null"] },
          "owner_user_id": { "type": "integer", "minimum": 1 },
          "expose_invite_tokens": { "type": "boolean" },
          "initial_invites": {
            "type": "array",
            "maxItems": 25,
            "items": { "$ref": "#/components/schemas/AdminSpaceInitialInviteRequest" }
          }
        },
        "required": ["name"]
      },
      "AdminSpaceOnboardingInviteResult": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "email": { "type": "string", "format": "email" },
          "role": { "type": "string", "enum": ["owner", "admin", "member", "viewer"] },
          "created": { "type": "boolean" },
          "expires_at": { "type": "string", "format": "date-time" },
          "created_at": { "type": "string", "format": "date-time" },
          "delivery": {
            "type": "object",
            "properties": {
              "attempted": { "type": "boolean" },
              "sent": { "type": "boolean" },
              "reason": { "type": ["string", "null"] },
              "messageId": { "type": ["string", "null"] }
            },
            "required": ["attempted", "sent"]
          },
          "invite_url": { "type": "string" },
          "token": { "type": "string" },
          "error": { "type": "string" },
          "code": { "type": "string" }
        },
        "required": ["email", "role", "created"]
      },
      "AdminSpaceCreateWithOnboardingResponse": {
        "type": "object",
        "properties": {
          "space": { "$ref": "#/components/schemas/SpaceRecord" },
          "owner": {
            "type": "object",
            "properties": {
              "user_id": { "type": ["integer", "null"] },
              "email": { "type": ["string", "null"], "format": "email" },
              "name": { "type": ["string", "null"] },
              "role": { "type": "string", "enum": ["owner"] },
              "pending": { "type": "boolean" }
            },
            "required": ["role", "pending"]
          },
          "invite_results": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/AdminSpaceOnboardingInviteResult" }
          },
          "summary": {
            "type": "object",
            "properties": {
              "requested": { "type": "integer" },
              "created": { "type": "integer" },
              "failed": { "type": "integer" }
            },
            "required": ["requested", "created", "failed"]
          }
        },
        "required": ["space", "owner", "invite_results", "summary"]
      },
      "SpaceMembershipRecord": {
        "type": "object",
        "properties": {
          "id": { "type": "integer" },
          "space_id": { "type": "integer" },
          "user_id": { "type": "integer" },
          "role": { "type": "string" },
          "created_by": { "type": ["integer", "null"] },
          "created_at": { "type": "string", "format": "date-time" },
          "updated_at": { "type": "string", "format": "date-time" },
          "suspended_at": { "type": ["string", "null"], "format": "date-time" },
          "suspended_by": { "type": ["integer", "null"] },
          "email": { "type": ["string", "null"] },
          "name": { "type": ["string", "null"] },
          "user_role": { "type": ["string", "null"] }
        },
        "required": ["id", "space_id", "user_id", "role", "created_at", "updated_at"]
      },
      "SpaceMembershipSuspensionRequest": {
        "type": "object",
        "properties": {
          "suspended": { "type": "boolean" }
