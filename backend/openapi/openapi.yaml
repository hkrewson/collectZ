      "delete": {
        "tags": ["Auth"],
        "summary": "End the current explicit admin support session",
        "security": [
          { "cookieSession": [], "csrfHeader": [] }
        ],
        "responses": {
          "200": {
            "description": "Support session ended",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AuthScopeResponse" }
              }
            }
          },
          "403": {
            "description": "Support session denied",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/Error" }
              }
            }
