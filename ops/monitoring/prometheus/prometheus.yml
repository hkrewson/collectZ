global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/collectz-alert-rules.yaml

scrape_configs:
  - job_name: collectz
    metrics_path: /api/metrics
    scheme: http
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/collectz-metrics-token.txt
    static_configs:
      - targets:
          - backend:3001
