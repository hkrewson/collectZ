services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../docs/alerts/collectz-alert-rules.yaml:/etc/prometheus/rules/collectz-alert-rules.yaml:ro
      - ./prometheus/collectz-metrics-token.txt:/etc/prometheus/secrets/collectz-metrics-token.txt:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - default
      - app_internal

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - default
      - app_internal

volumes:
  prometheus_data:
  grafana_data:

networks:
  app_internal:
    external: true
    name: ${APP_DOCKER_NETWORK:-collectz_internal}
