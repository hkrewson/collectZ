services:
  syslog-collector:
    image: node:20-alpine
    restart: unless-stopped
    command: ["node", "/app/collector.js"]
    environment:
      SYSLOG_TCP_PORT: "1514"
      SYSLOG_UDP_PORT: "1514"
      SYSLOG_OUTPUT_FILE: /var/log/collectz/collectz-syslog.log
    ports:
      - "1514:1514/tcp"
      - "1514:1514/udp"
    volumes:
      - ./syslog/collector.js:/app/collector.js:ro
      - syslog_data:/var/log/collectz
    networks:
      - app_internal

volumes:
  syslog_data:

networks:
  app_internal:
    external: true
    name: ${APP_DOCKER_NETWORK:-collectz_internal}
